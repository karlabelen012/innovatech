# ===================================================
# BFF - Innovatech Solutions
# Backend for Frontend — puerto 8080
# ===================================================
spring.application.name=bff-innovatech
server.port=8080

# ===================================================
# URLs de los microservicios
# ===================================================
ms.proyectos.url=http://localhost:8081
ms.recursos.url=http://localhost:8084
ms.analitica.url=http://localhost:8083

# ===================================================
# RestTemplate timeouts
# ===================================================
app.rest.connect-timeout=5000
app.rest.read-timeout=10000

# ===================================================
# Swagger / OpenAPI
# ===================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.info.title=BFF Innovatech Solutions
springdoc.info.description=Backend for Frontend — punto único de entrada hacia los microservicios
springdoc.info.version=1.0.0

# ===================================================
# CORS
# ===================================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ===================================================
# Logging
# ===================================================
logging.level.cl.duoc.innovatech=DEBUG
logging.level.org.springframework.web.client=DEBUG
