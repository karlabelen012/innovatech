# ===================================================
# MS-ANALITICA - Innovatech Solutions
# Microservicio de Monitoreo y Analítica
# ===================================================
spring.application.name=ms-analitica
server.port=8083

# Base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ms_analitica_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging
logging.level.cl.duoc.innovatech=DEBUG
