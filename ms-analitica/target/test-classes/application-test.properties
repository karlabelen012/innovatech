spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Evita que distintos contextos de test (@SpringBootTest vs @DataJpaTest) compartan
# la misma BD H2 "testdb" y se hagan DROP entre si.
spring.datasource.generate-unique-name=true

# El esquema lo crea schema.sql (no Hibernate), para evitar problemas de
# generacion automatica de DDL en los slices @DataJpaTest.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.sql.init.mode=always
spring.sql.init.platform=h2
